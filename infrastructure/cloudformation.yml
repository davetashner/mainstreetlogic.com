AWSTemplateFormatVersion: '2010-09-09'
Description: 'Main Street Logic - S3 + CloudFront static website hosting'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
    Description: Deployment environment

  DomainName:
    Type: String
    Default: mainstreetlogic.com
    Description: Primary domain name

  HostedZoneId:
    Type: String
    Default: Z0323027WXRAQQHL711J
    Description: Route 53 Hosted Zone ID

  IncludeWww:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Include www subdomain

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, '']]
  IncludeWwwDomain: !And
    - !Condition HasCustomDomain
    - !Equals [!Ref IncludeWww, 'true']
  CanCreateDnsRecords: !And
    - !Condition HasCustomDomain
    - !Condition HasHostedZone

Resources:
  # ACM Certificate for custom domain (must be in us-east-1 for CloudFront)
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !If
          - IncludeWwwDomain
          - !Sub 'www.${DomainName}'
          - !Ref AWS::NoValue
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !If [HasHostedZone, !Ref HostedZoneId, !Ref 'AWS::NoValue']
        - !If
          - IncludeWwwDomain
          - DomainName: !Sub 'www.${DomainName}'
            HostedZoneId: !If [HasHostedZone, !Ref HostedZoneId, !Ref 'AWS::NoValue']
          - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: mainstreetlogic
        - Key: Environment
          Value: production

  # CloudFront Function to rewrite URLs for static site routing
  # Handles: /about -> /about/index.html, /about/ -> /about/index.html
  UrlRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub 'mainstreetlogic-url-rewrite-${AWS::AccountId}'
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;

          // If URI ends with / add index.html
          if (uri.endsWith('/')) {
            request.uri += 'index.html';
          }
          // If URI doesn't have a file extension, assume it's a directory
          else if (!uri.includes('.')) {
            request.uri += '/index.html';
          }

          return request;
        }
      FunctionConfig:
        Comment: 'Rewrite URLs to serve index.html for clean URLs'
        Runtime: cloudfront-js-2.0

  # S3 bucket for production site
  ProductionBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mainstreetlogic-production-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: mainstreetlogic
        - Key: Environment
          Value: production

  # S3 bucket for staging/PR previews
  StagingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mainstreetlogic-staging-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldPRPreviews
            Status: Enabled
            ExpirationInDays: 30
            Prefix: 'pr-'
      Tags:
        - Key: Project
          Value: mainstreetlogic
        - Key: Environment
          Value: staging

  # Origin Access Control for CloudFront to access S3
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'mainstreetlogic-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Bucket policy allowing CloudFront access via OAC
  ProductionBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ProductionBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ProductionBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${ProductionDistribution}'

  StagingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StagingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${StagingBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${StagingDistribution}'

  # CloudFront distribution for production
  ProductionDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: 'Main Street Logic - Production'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # US, Canada, Europe only (cheapest)

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ProductionBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt UrlRewriteFunction.FunctionMetadata.FunctionARN

        # Custom error pages - S3 with OAC returns 403 for missing objects
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 403
            ResponseCode: 403
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

        # Custom domain configuration
        Aliases: !If
          - HasCustomDomain
          - !If
            - IncludeWwwDomain
            - - !Ref DomainName
              - !Sub 'www.${DomainName}'
            - - !Ref DomainName
          - !Ref AWS::NoValue

        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref Certificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

      Tags:
        - Key: Project
          Value: mainstreetlogic
        - Key: Environment
          Value: production

  # CloudFront distribution for staging
  StagingDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: 'Main Street Logic - Staging'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StagingBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # Use CachingDisabled for staging to always see latest
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt UrlRewriteFunction.FunctionMetadata.FunctionARN

        # Custom error pages - S3 with OAC returns 403 for missing objects
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 403
            ResponseCode: 403
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Project
          Value: mainstreetlogic
        - Key: Environment
          Value: staging

  # Route 53 DNS records for apex domain
  DnsRecordApex:
    Type: AWS::Route53::RecordSet
    Condition: CanCreateDnsRecords
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ProductionDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant)
        EvaluateTargetHealth: false

  # Route 53 DNS record for www subdomain
  DnsRecordWww:
    Type: AWS::Route53::RecordSet
    Condition: CanCreateDnsRecords
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'www.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt ProductionDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant)
        EvaluateTargetHealth: false

  # ===========================================
  # Contact Form Backend (Lambda + API Gateway + SES)
  # ===========================================

  # SES Email Identity for domain verification
  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref DomainName
      DkimAttributes:
        SigningEnabled: true

  # Lambda Execution Role
  ContactFormLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'mainstreetlogic-contact-form-role-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
      Tags:
        - Key: Project
          Value: mainstreetlogic

  # Lambda Function for Contact Form
  ContactFormFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'mainstreetlogic-contact-form-${AWS::AccountId}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt ContactFormLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TO_EMAIL: !Sub 'hello@${DomainName}'
          FROM_EMAIL: !Sub 'noreply@${DomainName}'
          ALLOWED_ORIGIN: !If
            - HasCustomDomain
            - !Sub 'https://${DomainName}'
            - !Sub 'https://${ProductionDistribution.DomainName}'
      Code:
        ZipFile: |
          const { SESClient, SendEmailCommand } = require('@aws-sdk/client-ses');

          const ses = new SESClient({ region: 'us-east-1' });

          exports.handler = async (event) => {
            const allowedOrigin = process.env.ALLOWED_ORIGIN;
            const headers = {
              'Content-Type': 'application/json',
              'Access-Control-Allow-Origin': allowedOrigin,
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'POST, OPTIONS'
            };

            // Handle CORS preflight
            if (event.httpMethod === 'OPTIONS') {
              return { statusCode: 200, headers, body: '' };
            }

            try {
              const body = JSON.parse(event.body || '{}');
              const { name, email, business, message, website } = body;

              // Honeypot check - if website field is filled, it's a bot
              if (website) {
                console.log('Honeypot triggered, silently rejecting');
                return {
                  statusCode: 200,
                  headers,
                  body: JSON.stringify({ success: true })
                };
              }

              // Validate required fields
              if (!name || !email || !message) {
                return {
                  statusCode: 400,
                  headers,
                  body: JSON.stringify({ error: 'Missing required fields: name, email, message' })
                };
              }

              // Basic email validation
              const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
              if (!emailRegex.test(email)) {
                return {
                  statusCode: 400,
                  headers,
                  body: JSON.stringify({ error: 'Invalid email format' })
                };
              }

              // Build email content
              const businessLine = business ? `Business: ${business}\n` : '';
              const emailBody = `New contact form submission from mainstreetlogic.com

          Name: ${name}
          Email: ${email}
          ${businessLine}
          Message:
          ${message}`;

              const command = new SendEmailCommand({
                Source: process.env.FROM_EMAIL,
                Destination: {
                  ToAddresses: [process.env.TO_EMAIL]
                },
                Message: {
                  Subject: {
                    Data: `Contact Form: ${name}`,
                    Charset: 'UTF-8'
                  },
                  Body: {
                    Text: {
                      Data: emailBody,
                      Charset: 'UTF-8'
                    }
                  }
                },
                ReplyToAddresses: [email]
              });

              await ses.send(command);

              return {
                statusCode: 200,
                headers,
                body: JSON.stringify({ success: true })
              };
            } catch (error) {
              console.error('Error processing contact form:', error);
              return {
                statusCode: 500,
                headers,
                body: JSON.stringify({ error: 'Failed to send message. Please try again later.' })
              };
            }
          };
      Tags:
        - Key: Project
          Value: mainstreetlogic

  # API Gateway REST API
  ContactFormApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'mainstreetlogic-contact-api-${AWS::AccountId}'
      Description: Contact form API for mainstreetlogic.com
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Project
          Value: mainstreetlogic

  # API Gateway Resource (/contact)
  ContactFormResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ContactFormApi
      ParentId: !GetAtt ContactFormApi.RootResourceId
      PathPart: contact

  # API Gateway POST Method
  ContactFormPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ContactFormApi
      ResourceId: !Ref ContactFormResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ContactFormFunction.Arn}/invocations'

  # API Gateway OPTIONS Method (CORS preflight)
  ContactFormOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ContactFormApi
      ResourceId: !Ref ContactFormResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ContactFormFunction.Arn}/invocations'

  # API Gateway Deployment
  ContactFormApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ContactFormPostMethod
      - ContactFormOptionsMethod
    Properties:
      RestApiId: !Ref ContactFormApi

  # API Gateway Stage
  ContactFormApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ContactFormApi
      DeploymentId: !Ref ContactFormApiDeployment
      StageName: v1
      Tags:
        - Key: Project
          Value: mainstreetlogic

  # Lambda Permission for API Gateway
  ContactFormApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContactFormFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ContactFormApi}/*'

Outputs:
  ProductionBucketName:
    Description: Production S3 bucket name
    Value: !Ref ProductionBucket
    Export:
      Name: !Sub '${AWS::StackName}-ProductionBucket'

  StagingBucketName:
    Description: Staging S3 bucket name
    Value: !Ref StagingBucket
    Export:
      Name: !Sub '${AWS::StackName}-StagingBucket'

  ProductionDistributionId:
    Description: Production CloudFront distribution ID
    Value: !Ref ProductionDistribution
    Export:
      Name: !Sub '${AWS::StackName}-ProductionDistributionId'

  ProductionDistributionDomain:
    Description: Production CloudFront domain name
    Value: !GetAtt ProductionDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-ProductionDomain'

  StagingDistributionId:
    Description: Staging CloudFront distribution ID
    Value: !Ref StagingDistribution
    Export:
      Name: !Sub '${AWS::StackName}-StagingDistributionId'

  StagingDistributionDomain:
    Description: Staging CloudFront domain name
    Value: !GetAtt StagingDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-StagingDomain'

  ProductionUrl:
    Description: Production website URL
    Value: !If
      - HasCustomDomain
      - !Sub 'https://${DomainName}'
      - !Sub 'https://${ProductionDistribution.DomainName}'

  StagingUrl:
    Description: Staging website URL
    Value: !Sub 'https://${StagingDistribution.DomainName}'

  CertificateArn:
    Condition: HasCustomDomain
    Description: ACM Certificate ARN
    Value: !Ref Certificate

  NameServers:
    Condition: HasCustomDomain
    Description: Update Namecheap to use these nameservers
    Value: 'ns-754.awsdns-30.net, ns-203.awsdns-25.com, ns-1685.awsdns-18.co.uk, ns-1283.awsdns-32.org'

  ContactFormApiUrl:
    Description: Contact form API endpoint URL
    Value: !Sub 'https://${ContactFormApi}.execute-api.${AWS::Region}.amazonaws.com/v1/contact'
    Export:
      Name: !Sub '${AWS::StackName}-ContactFormApiUrl'
