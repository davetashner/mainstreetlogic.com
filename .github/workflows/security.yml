name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning all commits in PR

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for enterprise features

      - name: Run TruffleHog (additional secret patterns)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        if: hashFiles('package-lock.json') != ''
        run: |
          echo "### Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true

          # Summarize results
          if grep -q "found 0 vulnerabilities" audit-output.txt; then
            echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          else
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Skip if no package-lock.json
        if: hashFiles('package-lock.json') == ''
        run: |
          echo "### Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "No package-lock.json found, skipping npm audit" >> $GITHUB_STEP_SUMMARY
